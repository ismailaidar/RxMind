<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RxMind — AI Pharmacy Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a56a4;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: #fff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    header h1 {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      color: #bfdbfe;
      font-size: 0.8rem;
      margin-top: 1px;
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.06);
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      min-height: 140px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a202c;
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus { border-color: #1a56a4; box-shadow: 0 0 0 3px rgba(26,86,164,0.1); }
    textarea::placeholder { color: #9ca3af; }

    /* ── Button ── */
    button {
      margin-top: 14px;
      padding: 12px 28px;
      background: #1a56a4;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover:not(:disabled) { background: #1648882; background: #1648882; background: #1e40af; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Loading ── */
    #loading {
      display: none;
      align-items: center;
      gap: 12px;
      color: #1a56a4;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 20px 28px;
      background: #eff6ff;
      border-radius: 14px;
      border: 1.5px solid #bfdbfe;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid #bfdbfe;
      border-top-color: #1a56a4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Response ── */
    #response-card { display: none; }

    #response-body {
      font-size: 0.92rem;
      line-height: 1.75;
      color: #1a202c;
      white-space: pre-wrap;
    }

    /* ── Error ── */
    #error-card {
      display: none;
      background: #fff5f5;
      border: 1.5px solid #fecaca;
      border-radius: 14px;
      padding: 20px 24px;
      color: #991b1b;
      font-size: 0.9rem;
      display: none;
      align-items: center;
      gap: 10px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.78rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-icon">💊</div>
    <div>
      <h1>RxMind</h1>
      <p>AI-powered specialty pharmacy assistant</p>
    </div>
  </header>

  <main>

    <div class="card">
      <div class="card-title">Prescription Request</div>
      <textarea
        id="input"
        placeholder="Describe your prescription request — include medication name, dosage, insurance provider, and prescriber if available.&#10;&#10;Example: My name is Sarah Chen. My doctor Dr. Patel prescribed Humira 40mg for Crohn's disease. I have BlueCross insurance."
      ></textarea>
      <button id="submit-btn" onclick="submit()">
        <span>Submit Request</span>
      </button>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      <span>Processing your request through our AI pharmacy team…</span>
    </div>

    <div id="error-card">
      <span>⚠️</span>
      <span id="error-msg">Something went wrong. Please try again.</span>
    </div>

    <div id="response-card" class="card">
      <div class="card-title">Pharmacy Team Response</div>
      <div id="response-body"></div>
    </div>

  </main>

  <footer>RxMind — For demonstration purposes only. Not a substitute for professional medical advice.</footer>

  <script>
    const API_URL = "http://localhost:5033/process";

    async function submit() {
      const input = document.getElementById("input").value.trim();
      if (!input) return;

      setLoading(true);
      hide("response-card");
      hide("error-card");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input })
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        showResponse(data.response);
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    }

    function setLoading(on) {
      document.getElementById("loading").style.display = on ? "flex" : "none";
      document.getElementById("submit-btn").disabled = on;
    }

    function showResponse(text) {
      document.getElementById("response-body").textContent = text;
      show("response-card");
    }

    function showError(msg) {
      document.getElementById("error-msg").textContent = msg;
      document.getElementById("error-card").style.display = "flex";
    }

    function show(id) { document.getElementById(id).style.display = "block"; }
    function hide(id) { document.getElementById(id).style.display = "none"; }

    // Submit on Ctrl+Enter
    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) submit();
    });
  </script>

</body>
</html>
